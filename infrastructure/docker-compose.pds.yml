# Self-hosted ATProto PDS for Co-op Source Network
#
# Production-oriented PDS configuration. Runs alongside the main
# docker-compose.yml services (PostgreSQL, Redis, etc.).
#
# Usage:
#   docker compose -f infrastructure/docker-compose.pds.yml up -d
#
# Required env vars (set in .env or shell):
#   PDS_HOSTNAME         — public hostname for the PDS (e.g. pds.mycoop.coop)
#   PDS_ADMIN_PASSWORD   — admin password for PDS account management
#   PDS_JWT_SECRET       — JWT secret (min 32 chars)
#
# Optional env vars:
#   PDS_ROTATION_KEY     — k256 private key hex for PLC rotation
#   PDS_PLC_URL          — PLC directory URL (default: https://plc.directory)

services:
  pds:
    image: ghcr.io/bluesky-social/pds:0.4
    ports:
      - "${PDS_PORT:-2583}:3000"
    volumes:
      - pds-data:/pds
    environment:
      PDS_HOSTNAME: ${PDS_HOSTNAME:-localhost}
      PDS_PORT: 3000
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blobs
      PDS_JWT_SECRET: ${PDS_JWT_SECRET:-dev-jwt-secret-change-me-32chars!!}
      PDS_ADMIN_PASSWORD: ${PDS_ADMIN_PASSWORD:-admin}
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${PDS_ROTATION_KEY:-}
      PDS_DID_PLC_URL: ${PDS_PLC_URL:-https://plc.directory}
      # AppView + moderation service (Bluesky defaults)
      PDS_BSKY_APP_VIEW_URL: https://api.bsky.app
      PDS_BSKY_APP_VIEW_DID: did:web:api.bsky.app
      PDS_REPORT_SERVICE_URL: https://mod.bsky.app
      PDS_REPORT_SERVICE_DID: did:plc:ar7c4by46qjdydhdevvrndac
      PDS_CRAWLERS: https://bsky.network
      # Email (optional, for account recovery)
      PDS_EMAIL_SMTP_URL: ${PDS_EMAIL_SMTP_URL:-}
      PDS_EMAIL_FROM_ADDRESS: ${PDS_EMAIL_FROM_ADDRESS:-noreply@localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/xrpc/_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pds-data:
