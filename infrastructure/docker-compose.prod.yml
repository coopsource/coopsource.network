services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coopsource}
      POSTGRES_USER: ${POSTGRES_USER:-coopsource}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coopsource}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-coopsource}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-coopsource}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET (min 32 chars)}
      KEY_ENC_KEY: ${KEY_ENC_KEY:?Set KEY_ENC_KEY (openssl rand -base64 32)}
      INSTANCE_URL: https://${DOMAIN:-coopsource.network}
      FRONTEND_URL: https://${DOMAIN:-coopsource.network}
      PUBLIC_API_URL: https://${DOMAIN:-coopsource.network}
      PLC_URL: ${PLC_URL:-local}
      BLOB_DIR: /app/data/blobs
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@coopsource.local}
    volumes:
      - blobdata:/app/data/blobs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:3001
      PUBLIC_API_URL: https://${DOMAIN:-coopsource.network}
      ORIGIN: https://${DOMAIN:-coopsource.network}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-coopsource.network}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  pgdata:
  blobdata:
  caddy_data:
  caddy_config:
