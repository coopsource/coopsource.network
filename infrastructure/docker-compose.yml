services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coopsource_dev
      POSTGRES_USER: coopsource
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopsource"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view captured emails at http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ALLOW_INSECURE: true

  # --- ATProto Federation (V6 Phase F1) ---

  plc:
    build:
      context: .
      dockerfile: Dockerfile.plc
    ports:
      - "2582:2582"
    environment:
      DATABASE_URL: postgresql://coopsource:dev_password@postgres:5432/plc_dev
      PORT: 2582
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2582/_health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pds:
    image: ghcr.io/bluesky-social/pds:0.4
    ports:
      - "2583:3000"
    volumes:
      - pds-data:/pds
    environment:
      PDS_HOSTNAME: ${PDS_HOSTNAME:-localhost}
      PDS_PORT: 3000
      PDS_DEV_MODE: "true"
      PDS_JWT_SECRET: ${PDS_JWT_SECRET:-dev-jwt-secret-change-me-32chars!!}
      PDS_ADMIN_PASSWORD: ${PDS_ADMIN_PASSWORD:-admin}
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ${PDS_ROTATION_KEY:-5e7541331aa00cf45649f00c22cdc09dac8bdb95ffd0909150d08e3e5816c810}
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blobs
      PDS_DID_PLC_URL: http://plc:2582
      PDS_BSKY_APP_VIEW_URL: https://api.bsky.app
      PDS_BSKY_APP_VIEW_DID: did:web:api.bsky.app
      PDS_REPORT_SERVICE_URL: https://mod.bsky.app
      PDS_REPORT_SERVICE_DID: did:plc:ar7c4by46qjdydhdevvrndac
      PDS_CRAWLERS: https://bsky.network
    depends_on:
      plc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/xrpc/_health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  pgdata:
  pds-data:
